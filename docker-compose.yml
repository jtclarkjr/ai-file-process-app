services:
  # ==========================================================================
  # Development Backend (hot-reload)
  # ==========================================================================
  backend-dev:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: ai-file-processor-dev
    ports:
      - "8080:8080"
    volumes:
      - ./Cargo.toml:/app/Cargo.toml:cached
      - ./Cargo.lock:/app/Cargo.lock:cached
      - ./backend:/app/backend:cached
    env_file:
      - .env
    environment:
      - RUST_LOG=backend=debug,tower_http=debug
      - HOST=0.0.0.0
      - PORT=8080
    stdin_open: true
    tty: true
    profiles:
      - dev

  # ==========================================================================
  # Production App (full stack)
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-file-processor
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - RUST_LOG=backend=info,tower_http=info
      - HOST=0.0.0.0
      - PORT=8080
    profiles:
      - production
