services:
  # ==========================================================================
  # Development Backend (hot-reload)
  # ==========================================================================
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai-file-processor-dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend/app:/app/app:cached
      - ./backend/tests:/app/tests:cached
    env_file:
      - .env
    environment:
      - LOG_LEVEL=DEBUG
      - HOST=0.0.0.0
      - PORT=8080
    stdin_open: true
    tty: true
    profiles:
      - dev

  # ==========================================================================
  # Production App (full stack)
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-file-processor
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8080
    profiles:
      - production
